name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:

  prek:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Security: do not set to true — prevents credential leakage (GitHub Advanced Security).
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Run prek on changed files in PRs
        if: github.event_name == 'pull_request'
        uses: j178/prek-action@cbc2f23eb5539cf20d82d1aabd0d0ecbcc56f4e3 # v2.0.2
        with:
          extra-args: --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}
      - name: Run prek on all files on pushes
        if: github.event_name != 'pull_request'
        uses: j178/prek-action@cbc2f23eb5539cf20d82d1aabd0d0ecbcc56f4e3 # v2.0.2
        with:
          extra-args: --all-files

  check-environment-yml:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Security: do not set to true — prevents credential leakage (GitHub Advanced Security).
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install pyproject2conda
        # Pinned to the 0.22.x line to match the local prek hook rev (v0.22.1).
        # 0.23.0 introduced a regression:
        # `AttributeError: 'CondaRequirement' object has no attribute 'channel'`
        # raised from `_iter_parts` during `__hash__` of any conda requirement,
        # so any invocation that processes conda deps fails immediately.
        # The upper bound allows a hypothetical 0.22.x patch backport while
        # excluding 0.23.x. Bump in lockstep with the .pre-commit-config.yaml
        # rev once a fixed release is available.
        run: pip install "pyproject2conda>=0.22.1,<0.23"
      - name: Regenerate environment.yml (same args as local prek hook config)
        run: |
          pyproject2conda yaml -e dev -o /tmp/environment.generated.yml -n CausalPy \
            -w force --no-header \
            --python-include "python>=3.12" \
            -d make -d pip -d pymc-bart -r "marimo[mcp]"
      - name: Check environment.yml is in sync with pyproject.toml
        run: |
          # Compare YAML body only (skip 9-line autogenerated header in environment.yml)
          tail -n +10 environment.yml > /tmp/environment.current.yml
          diff -u /tmp/environment.current.yml /tmp/environment.generated.yml && echo "environment.yml is in sync with pyproject.toml"

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        # Required so the conda env activated by setup-micromamba persists across steps.
        shell: bash -el {0}
    strategy:
      matrix:
        # 3.11 dropped from this prototype because environment.yml is generated with
        # `--python-include "python>=3.12"`. Re-adding 3.11 needs a separate decision
        # about whether the dev env should support it.
        python-version: ["3.12", "3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Security: do not set to true — prevents credential leakage (GitHub Advanced Security).
          persist-credentials: false
      - name: Setup micromamba environment
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-file: environment.yml
          environment-name: CausalPy
          # Pin python to the matrix version and add test-only deps that are
          # not in environment.yml (it is generated with `-e dev`, not `-e test`).
          create-args: >-
            python=${{ matrix.python-version }}
            pytest
            pytest-cov
            papermill
          cache-environment: true
      - name: Install package
        # --no-deps so pip does not pull pip-built pymc/pytensor on top of the
        # conda-forge ones. Runtime deps come from environment.yml.
        run: pip install --no-deps -e .
      - name: Show environment
        run: |
          micromamba list
          python -c "import pymc, pytensor; print('pymc', pymc.__version__); print('blas_ldflags=', pytensor.config.blas__ldflags)"
      - name: Run doctests
        run: pytest --doctest-modules --ignore=causalpy/tests/ causalpy/ --config-file=causalpy/tests/conftest.py --no-cov
      - name: Run extra tests
        run: pytest docs/source/.codespell/test_notebook_to_markdown.py --no-cov
      - name: Run tests
        run: pytest --cov-report=xml --no-cov-on-fail
      - name: Check codespell for notebooks
        run: |
          python ./docs/source/.codespell/notebook_to_markdown.py --tempdir tmp_markdown
          codespell
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # use token for more robust uploads
          name: ${{ matrix.python-version }}
          fail_ci_if_error: false
